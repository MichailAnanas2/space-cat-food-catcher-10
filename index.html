<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover" />
  <meta name="theme-color" content="#0D1B2A" />
  <meta name="description" content="Космические животные уворачиваются от бомб — аркада на HTML5 Canvas" />
  <title>Космические животные уворачиваются от бомб</title>
  <link rel="stylesheet" href="style.css?v=2" />
</head>
<body>
  <div id="app">
    <div id="game-wrapper">
      <canvas id="game" width="960" height="540" aria-label="Space Animals Dodge Bombs"></canvas>

      <!-- HUD -->
      <div id="hud" class="hud hidden">
        <div class="hud-left">
          <span class="hud-icon star-icon" aria-hidden="true"></span>
          <span data-i18n="score">Счёт</span>: <span id="hud-score">0</span>
        </div>
        <div class="hud-center">
          <div class="level-badge"><span data-i18n="level">Ур.</span> <span id="hud-level">1</span></div>
          <div class="progress-wrap">
            <div class="progress-bar"><div id="hud-progress"></div></div>
            <div class="progress-goal"><span id="hud-current">0</span> / <span id="hud-goal">250</span></div>
          </div>
        </div>
        <div class="hud-right">
          <div id="hud-lives" class="lives" aria-label="жизни"></div>
          <span data-i18n="highscore" style="display:none">Рекорд</span>
          <button id="btn-pause" class="icon-btn pause-btn" aria-label="пауза"></button>
        </div>
      </div>

      <!-- Touch controls -->
      <div id="touch-controls" class="touch-controls hidden">
        <button id="btn-touch-left" class="touch-btn touch-left" aria-label="влево">◀</button>
        <button id="btn-touch-right" class="touch-btn touch-right" aria-label="вправо">▶</button>
        <button id="btn-touch-jump" class="touch-btn touch-jump" aria-label="прыжок">▲</button>
      </div>

      <!-- Loading -->
      <div id="screen-loading" class="screen">
        <div class="loading-box">
          <div class="game-title" data-i18n="game_title">Космические животные</div>
          <div class="game-subtitle" data-i18n="game_subtitle">уворачиваются от бомб</div>
          <div class="loading-star" aria-hidden="true">⭐</div>
          <div class="loading-bar"><div id="loading-fill"></div></div>
          <div id="loading-text" class="loading-text" data-i18n="loading">Загрузка...</div>
        </div>
      </div>

      <!-- Main menu -->
      <div id="screen-menu" class="screen hidden">
        <div class="menu-card">
          <div class="menu-title">
            <div data-i18n="game_title">Космические животные</div>
            <div class="menu-title-small" data-i18n="game_subtitle">уворачиваются от бомб</div>
          </div>
          <button id="btn-play" class="btn btn-primary" data-i18n="play">Играть</button>
          <button id="btn-select" class="btn btn-secondary" data-i18n="select_animal">Выбрать животное</button>
          <button id="btn-settings" class="btn btn-secondary" data-i18n="settings">Настройки</button>
          <div class="lang-toggle">
            <button id="btn-lang-ru" class="lang-btn active" data-lang="ru">RU</button>
            <button id="btn-lang-en" class="lang-btn" data-lang="en">EN</button>
          </div>
          <div class="hint" data-i18n="menu_hint">Собирай звёзды, уворачивайся от бомб, открывай новых героев!</div>
        </div>
      </div>

      <!-- Character select -->
      <div id="screen-select" class="screen hidden">
        <div class="select-card">
          <h2 data-i18n="select_animal">Выбрать животное</h2>
          <div id="character-grid" class="character-grid"></div>
          <button id="btn-select-back" class="btn btn-secondary" data-i18n="back">Назад</button>
        </div>
      </div>

      <!-- Pause -->
      <div id="screen-pause" class="screen hidden">
        <div class="panel-card">
          <h2 data-i18n="paused">Пауза</h2>
          <button id="btn-resume" class="btn btn-primary" data-i18n="resume">Продолжить</button>
          <button id="btn-retry-pause" class="btn btn-secondary" data-i18n="retry">Переиграть</button>
          <button id="btn-menu-pause" class="btn btn-secondary" data-i18n="menu">В меню</button>
        </div>
      </div>

      <!-- Result -->
      <div id="screen-result" class="screen hidden">
        <div class="panel-card">
          <h2 id="result-title" data-i18n="level_clear">Уровень пройден!</h2>
          <div id="result-unlock" class="result-unlock hidden">
            <div class="unlock-label" data-i18n="new_animal">Новый герой открыт!</div>
            <div id="unlock-portrait" class="unlock-portrait"></div>
            <div id="unlock-name" class="unlock-name"></div>
          </div>
          <div class="result-score-row">
            <span data-i18n="score">Счёт</span>: <span id="result-score">0</span>
          </div>
          <div class="result-score-row">
            <span data-i18n="highscore">Рекорд</span>: <span id="result-high">0</span>
          </div>
          <button id="btn-next" class="btn btn-primary hidden" data-i18n="next">Дальше</button>
          <button id="btn-retry-result" class="btn btn-secondary" data-i18n="retry">Попробовать снова</button>
          <button id="btn-menu-result" class="btn btn-secondary" data-i18n="menu">В меню</button>
        </div>
      </div>

      <!-- Settings -->
      <div id="screen-settings" class="screen hidden">
        <div class="panel-card settings-card">
          <h2 data-i18n="settings">Настройки</h2>
          <label class="setting-row">
            <span data-i18n="music_volume">Музыка</span>
            <input id="vol-music" type="range" min="0" max="1" step="0.05" value="0.6" />
          </label>
          <label class="setting-row">
            <span data-i18n="sfx_volume">Звуки</span>
            <input id="vol-sfx" type="range" min="0" max="1" step="0.05" value="0.7" />
          </label>
          <label class="setting-row toggle-row">
            <span data-i18n="vibration">Вибрация</span>
            <button id="btn-vibro" class="toggle" aria-pressed="true">ON</button>
          </label>
          <label class="setting-row toggle-row">
            <span data-i18n="particles">Частицы</span>
            <button id="btn-particles" class="toggle" aria-pressed="true">ON</button>
          </label>
          <div class="lang-toggle">
            <button id="btn-lang-ru-set" class="lang-btn active" data-lang="ru">RU</button>
            <button id="btn-lang-en-set" class="lang-btn" data-lang="en">EN</button>
          </div>
          <button id="btn-reset" class="btn btn-danger" data-i18n="reset_progress">Сбросить прогресс</button>
          <button id="btn-settings-back" class="btn btn-secondary" data-i18n="back">Назад</button>
        </div>
      </div>
    </div>
  </div>

  <script src="game.js?v=2"></script>
</body>
</html>
